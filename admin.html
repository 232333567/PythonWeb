<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>管理员登录</title>
    <style>
        body{max-width:400px;margin:50px auto;padding:0 20px}
        input,button{width:100%;padding:10px;margin:5px 0}
    </style>
</head>
<body>
    <h2>管理员登录</h2>
    <input type="password" id="pwd" placeholder="输入密码">
    <button onclick="login()">登录</button>

    <script>
        const MY_PASSWORD = "123456"; // 你可以改密码
        function login(){
            let p = document.getElementById("pwd").value;
            if(p === MY_PASSWORD){
                // 1. 改提示文案（可选，更贴合GitHub）
                alert("登录成功！你可以去GitHub上传新作品");
                // 2. 改跳转链接（核心）
                location.href = "https://github.com/"; 
                // 如果有具体的仓库地址，也可以填仓库链接，比如：
                // location.href = "https://github.com/你的用户名/你的仓库名";
            }else{
                alert("密码错误");
            }
        }
    </script>
</body>
</html>
